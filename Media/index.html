<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stage 4 - Media & Embedding</title>
</head>
<body>

    <header>
        <h1>Media & Embedding Example</h1>
    </header>

    <main>

        <section>
            <h2>Image Example</h2>
            <img src="/images (1).jpeg" alt="Sample image" width="300">
        </section>

        <section>
            <h2>Audio Example</h2>
            <audio controls>
                <source src="assets/audio.mp3" type="audio/mpeg">
                Your browser does not support audio.
            </audio>
        </section>

        <section>
            <h2>Video Example</h2>
            <video width="400" controls>
                <source src="assets/video.mp4" type="video/mp4">
                Your browser does not support video.
            </video>
        </section>

        <section>
            <h2>Embedded YouTube Video</h2>
            <iframe 
                width="400" 
                height="250" 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                title="YouTube video"
                frameborder="0"
                allowfullscreen>
            </iframe>
        </section>

    </main>

    <footer>
        <p>© 2026 HTML Learning Journey</p>
    </footer>

</body>
</html>
